<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="page-wrapper">
        <form action="" method="get">
            <div class="decoration">
                <!-- decorative hexagon pattern -->
                <svg class="hex-pattern" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
                    <defs>
                        <pattern id="hex" x="0" y="0" width="80" height="92" patternUnits="userSpaceOnUse">
                            <polygon points="40,5 70,22 70,57 40,74 10,57 10,22"
                                fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
                            <text x="40" y="45" text-anchor="middle" font-size="14"
                                fill="rgba(255,255,255,0.07)" font-family="monospace">&lt;/&gt;</text>
                        </pattern>
                        <pattern id="hex2" x="40" y="46" width="80" height="92" patternUnits="userSpaceOnUse">
                            <polygon points="40,5 70,22 70,57 40,74 10,57 10,22"
                                fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>
                            <text x="40" y="45" text-anchor="middle" font-size="14"
                                fill="rgba(255,255,255,0.05)" font-family="monospace">&lt;/&gt;</text>
                        </pattern>
                    </defs>
                    <rect width="100%" height="100%" fill="url(#hex)"/>
                    <rect width="100%" height="100%" fill="url(#hex2)"/>
                </svg>
            </div>

            <div class="sign-in">
                <!-- Code badge icon -->
                <div class="logo">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 46" width="48" height="48">
                        <polygon points="20,2 38,12 38,34 20,44 2,34 2,12" fill="#1a1a1a"/>
                        <text x="20" y="29" text-anchor="middle" font-size="16" fill="white" font-family="monospace" font-weight="bold">&lt;/&gt;</text>
                    </svg>
                </div>

                <div class="text">
                    <h1>Create Account</h1>
                    <p>Please fill out all the required fields to create your account!</p>
                </div>

                <div class="field">
                    <input type="text" name="name" id="name" placeholder=" " autocomplete="off" required>
                    <label for="name">Username</label>
                </div>
                <div class="field">
                    <input type="email" name="email" id="email" placeholder=" " autocomplete="off" required>
                    <label for="email">Email</label>
                </div>
                <div class="field">
                    <input type="password" name="password" id="password" placeholder=" " required>
                    <label for="password">Password</label>
                </div>
                <div class="field">
                    <input type="password" name="confirm-password" id="confirm-password" placeholder=" " required>
                    <label for="confirm-password">Confirm Password</label>
                </div>

                <div class="btn-wrapper">
                    <button type="submit">Create Account</button>
                </div>
            </div>
        </form>
    </div>
</body>

</html>
