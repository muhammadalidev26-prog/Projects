<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us Form</title>

    <link rel="stylesheet" href="check.css">
    <script src="https://kit.fontawesome.com/834a75c4f6.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="container">
        <div class="content">
            <div class="left-side">

                <div class="address details">
                    <i class="fas fa-map-marker-alt"></i>
                    <div class="topic">Address</div>
                    <div class="text-one">Surkhet NP12</div>
                    <div class="text-two">Karachi 02</div>
                </div>

                <div class="phone details">
                    <i class="fas fa-phone-alt"></i>
                    <div class="topic">Phone</div>
                    <div class="text-one">+1 234 537 890</div>
                    <div class="text-two">+1 234 567 820</div>
                </div>

                <div class="email details">
                    <i class="fas fa-envelope"></i>
                    <div class="topic">Email</div>
                    <div class="text-one">info@example.com</div>
                    <div class="text-two">support@example.com</div>
                </div>

            </div>

            <div class="right-side">

                <div class="topic-text">Send us a message</div>
                <p>If you have any work from me or any type of queries related to my work, you can send me a message from here, It's my pleasure to help you</p>

                <form action="#">

                    <div class="input-box">
                        <input type="text" id="name" placeholder="Enter your name">
                    </div>
                    
                    <div class="input-box">
                        <input type="email" id="email" placeholder="Enter your email">
                    </div>
                    
                    <div class="input-box message-box" >
                        <textarea id="message" placeholder="Enter your message"></textarea>
                    </div>

                    <div class="button">
                        <input type="button" value="Send now"> 
                    </div>
                </form>

            </div>
        </div>
    </div>
</body>
</html>
